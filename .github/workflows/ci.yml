name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        id: install
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        id: lint
        run: ruff check .

      - name: Train model artifact
        id: train
        run: python scripts/train_model.py --version v1 --output-dir models

      - name: Test
        id: test
        run: pytest --junitxml=test-results.xml

      - name: Build container
        id: docker-build
        run: docker build -t nxp-digit-inference:${{ github.sha }} .

      - name: Summarize CI result
        if: always()
        run: |
          {
            echo "## CI Result"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Install dependencies | ${{ steps.install.outcome }} |"
            echo "| Lint | ${{ steps.lint.outcome }} |"
            echo "| Train model artifact | ${{ steps.train.outcome }} |"
            echo "| Tests | ${{ steps.test.outcome }} |"
            echo "| Docker build | ${{ steps.docker-build.outcome }} |"
            echo ""
            echo "Image tag: \`nxp-digit-inference:${{ github.sha }}\`"
            echo "Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
